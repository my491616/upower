<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta property="og:title" content="正念能量調整 - 東風水事務所" />
  <meta property="og:description" content="選擇你想調整的能量方向，透過正念冥想感受宇宙能量流動。" />
  <meta property="og:type" content="website" />
  <title>正念能量調整APP - 東風水事務所</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
    * { font-family: 'Noto Sans TC', sans-serif; }
    body { margin: 0; padding: 0; }
    
    /* Page transitions */
    .page { display: none !important; }
    .page.active { display: flex !important; }
    
    /* Timer animation */
    @keyframes pulse-glow {
      0%, 100% { text-shadow: 0 0 20px rgba(255,255,255,0.5); }
      50% { text-shadow: 0 0 40px rgba(255,255,255,1), 0 0 80px rgba(255,255,255,0.5); }
    }
    .timer-text { animation: pulse-glow 2s ease-in-out infinite; }
    
    /* Card hover */
    .energy-card {
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      cursor: pointer;
    }
    .energy-card:hover {
      transform: scale(1.05);
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }
    .energy-card:active { transform: scale(0.97); }
    
    /* Completion animation */
    @keyframes celebrate {
      0% { transform: scale(0); opacity: 0; }
      60% { transform: scale(1.1); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }
    .celebrate { animation: celebrate 0.6s ease forwards; }
    
    /* Floating particles */
    @keyframes float-up {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
      100% { transform: translateY(-100px) rotate(720deg); opacity: 0; }
    }
    .particle {
      position: fixed;
      pointer-events: none;
      border-radius: 50%;
      animation: float-up linear forwards;
    }

    /* Shimmer on LINE button */
    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
    .line-btn {
      background: linear-gradient(90deg, #00B900, #00d900, #00B900);
      background-size: 200% auto;
      animation: shimmer 3s linear infinite;
    }
  </style>
</head>

<!-- ===== PAGE 3: 計時中 ===== -->

  <!-- Background layer -->
  <div id="timer-bg" class="absolute inset-0 bg-cover bg-center"></div>

<script>
const BASE = 'https://njkfdmxp.manus.space/assets/';

const categories = {
  wealth: {
    title: '財運能量調整',
    subtitle: '金光導入，金幣源源不絕',
    bg: BASE + 'wealth_golden_coins_effect-LbB6bfIO.png',
    status: '財運能量流動中...',
    complete: '財運能量調整完成！',
    message: '金光已注入，財運滾滾而來，願您財源廣進！'
  },
  love: {
    title: '桃花能量調整',
    subtitle: '粉紅花瓣飄落，愛情能量流動',
    bg: BASE + 'love_peach_blossom_effect-DtsY_-CP.png',
    status: '桃花能量流動中...',
    complete: '桃花能量調整完成！',
    message: '粉紅光芒已環繞，緣分正在悄悄靠近，願您愛情甜蜜！'
  },
  career: {
    title: '事業能量調整',
    subtitle: '藍色光芒向上攀升，事業成功',
    bg: BASE + 'career_success_effect-DQERNt74.png',
    status: '事業能量流動中...',
    complete: '事業能量調整完成！',
    message: '藍色光芒已加持，事業道路暢通，願您步步高升！'
  },
  health: {
    title: '健康能量調整',
    subtitle: '綠色生命能量環繞流動',
    bg: BASE + 'health_vitality_effect-BSyFg8MB.png',
    status: '健康能量流動中...',
    complete: '健康能量調整完成！',
    message: '生命能量已充盈，身心靈得到淨化，願您健康長壽！'
  },
  family: {
    title: '家庭能量調整',
    subtitle: '溫暖橙色光芒，家庭和諧',
    bg: BASE + 'family_harmony_effect-Ba9UrAcb.png',
    status: '家庭能量流動中...',
    complete: '家庭能量調整完成！',
    message: '溫暖光芒已充滿家宅，和諧之氣環繞，願您闔家幸福！'
  },
  fiveelements: {
    title: '五行能量調整',
    subtitle: '金木水火土，五行能量調和',
    bg: BASE + 'five_elements_effect-YhzZxwSi.png',
    status: '五行能量流動中...',
    complete: '五行能量調整完成！',
    message: '金木水火土五行已調和，宇宙能量平衡，願您萬事如意！'
  }
};

let currentCategory = null;
let selectedMins = 3;
let totalSeconds = 0;
let remainingSeconds = 0;
let timerInterval = null;
let isPaused = false;
let userPhotoSrc = null;
const isMobile = () => /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => {
    p.classList.remove('active');
  });
  const el = document.getElementById(id);
  el.classList.add('active');
  window.scrollTo(0, 0);
}

function showHome() {
  clearInterval(timerInterval);
  timerInterval = null;
  showPage('page-home');
}

function showCategory(key) {
  currentCategory = key;
  const cat = categories[key];
  document.getElementById('setup-title').textContent = cat.title;
  document.getElementById('setup-subtitle').textContent = cat.subtitle;
  selectTime(3);
  // Reset photo
  document.getElementById('photo-preview').classList.add('hidden');
  document.getElementById('upload-placeholder').classList.remove('hidden');
  document.getElementById('photo-input').value = '';
  userPhotoSrc = null;
  showPage('page-setup');
}

function selectTime(mins) {
  selectedMins = mins;
  document.querySelectorAll('.time-btn').forEach(btn => {
    btn.classList.toggle('active', parseInt(btn.dataset.mins) === mins);
  });
}

function previewPhoto(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    userPhotoSrc = e.target.result;
    const preview = document.getElementById('photo-preview');
    preview.src = e.target.result;
    preview.classList.remove('hidden');
    document.getElementById('upload-placeholder').classList.add('hidden');
  };
  reader.readAsDataURL(file);
}

function startSession() {
  const cat = categories[currentCategory];
  totalSeconds = selectedMins * 60;
  remainingSeconds = totalSeconds;
  isPaused = false;

  // Set timer background
  document.getElementById('timer-bg').style.backgroundImage = `url('${cat.bg}')`;
  document.getElementById('timer-status').textContent = cat.status;
  
  // Instruction text - responsive
  const instrEl = document.getElementById('timer-instruction');
  instrEl.textContent = isMobile()
    ? '將大拇指按在螢幕上，感受宇宙能量的流動'
    : '請靜心放鬆，雙手自然放在心輪位置，感受能量流動';

  // Photo overlay
  const overlay = document.getElementById('photo-overlay');
  const photoDisplay = document.getElementById('photo-display');
  if (userPhotoSrc) {
    photoDisplay.src = userPhotoSrc;
    overlay.style.display = 'flex';
  } else {
    overlay.style.display = 'none';
  }

  document.getElementById('pause-btn').textContent = '⏸';
  updateTimerDisplay();
  showPage('page-timer');

  timerInterval = setInterval(() => {
    if (!isPaused) {
      remainingSeconds--;
      updateTimerDisplay();
      if (remainingSeconds <= 0) {
        clearInterval(timerInterval);
        timerInterval = null;
        showComplete();
      }
    }
  }, 1000);
}

function updateTimerDisplay() {
  const mins = Math.floor(remainingSeconds / 60);
  const secs = remainingSeconds % 60;
  document.getElementById('timer-display').textContent =
    String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');
}

function togglePause() {
  isPaused = !isPaused;
  document.getElementById('pause-btn').textContent = isPaused ? '▶' : '⏸';
}

function showComplete() {
  const cat = categories[currentCategory];
  document.getElementById('complete-title').textContent = cat.complete;
  document.getElementById('complete-message').textContent = cat.message;
  
  showPage('page-complete');
  spawnParticles();
}

function repeatSession() {
  showCategory(currentCategory);
}

function spawnParticles() {
  const colors = ['#FFD700', '#FF69B4', '#00BFFF', '#98FB98', '#FFA500', '#DA70D6'];
  for (let i = 0; i < 20; i++) {
    setTimeout(() => {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = Math.random() * 12 + 6;
      p.style.cssText = `
        width: ${size}px; height: ${size}px;
        left: ${Math.random() * 100}vw;
        bottom: -20px;
        background: ${colors[Math.floor(Math.random() * colors.length)]};
        animation-duration: ${Math.random() * 2 + 2}s;
        opacity: ${Math.random() * 0.7 + 0.3};
      `;
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 4000);
    }, i * 100);
  }
}
</script>
