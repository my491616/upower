    * { font-family: 'Noto Sans TC', sans-serif; }
    body { margin: 0; padding: 0; }
    
    /* Page transitions */

    .page.active { display: flex !important; }
    
    /* Timer animation */
    @keyframes pulse-glow {
      0%, 100% { text-shadow: 0 0 20px rgba(255,255,255,0.5); }

      transition: transform 0.2s ease, box-shadow 0.2s ease;
      cursor: pointer;
    }
    .energy-card:hover {
      transform: scale(1.05);
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }
    .energy-card:active { transform: scale(0.97); }
    
    /* Completion animation */
    @keyframes celebrate {
      0% { transform: scale(0); opacity: 0; }
      60% { transform: scale(1.1); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }
    .celebrate { animation: celebrate 0.6s ease forwards; }
    
    /* Floating particles */
    @keyframes float-up {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
      100% { transform: translateY(-100px) rotate(720deg); opacity: 0; }
    }
    .particle {
      position: fixed;
      pointer-events: none;
      border-radius: 50%;
      animation: float-up linear forwards;
    }

    /* Shimmer on LINE button */
    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
    .line-btn {
      background: linear-gradient(90deg, #00B900, #00d900, #00B900);
      background-size: 200% auto;

<script>
const BASE = 'https://njkfdmxp.manus.space/assets/';

const categories = {
  wealth:      { title:'財運能量調整', subtitle:'金光導入，金幣源源不絕',       bg:BASE+'wealth_golden_coins_effect-LbB6bfIO.png',    status:'財運能量流動中...', complete:'財運能量調整完成！', message:'金光已注入，財運滾滾而來，願您財源廣進！',       hz:528 },
  love:        { title:'桃花能量調整', subtitle:'粉紅花瓣飄落，愛情能量流動',   bg:BASE+'love_peach_blossom_effect-DtsY_-CP.png',     status:'桃花能量流動中...', complete:'桃花能量調整完成！', message:'粉紅光芒已環繞，緣分正在悄悄靠近，願您愛情甜蜜！', hz:639 },
  career:      { title:'事業能量調整', subtitle:'藍色光芒向上攀升，事業成功',   bg:BASE+'career_success_effect-DQERNt74.png',         status:'事業能量流動中...', complete:'事業能量調整完成！', message:'藍色光芒已加持，事業道路暢通，願您步步高升！',     hz:741 },

  fiveelements:{ title:'五行能量調整', subtitle:'金木水火土，五行能量調和',     bg:BASE+'five_elements_effect-YhzZxwSi.png',          status:'五行能量流動中...', complete:'五行能量調整完成！', message:'金木水火土五行已調和，宇宙能量平衡，願您萬事如意！',hz:963 }
};

// ===== 頌缽音效引擎 (Web Audio API) =====
let audioCtx = null;
let bowlNodes = [];
let masterGainNode = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playSingingBowl(hz) {
  stopBowl();
  const ctx = getAudioCtx();
  if (ctx.state === 'suspended') ctx.resume();

  const harmonics = [
    { ratio: 1,    gain: 0.50 },
    { ratio: 2.76, gain: 0.25 },
    { ratio: 5.40, gain: 0.12 },
    { ratio: 8.93, gain: 0.06 },
  ];

  masterGainNode = ctx.createGain();
  masterGainNode.gain.setValueAtTime(0, ctx.currentTime);
  masterGainNode.gain.linearRampToValueAtTime(0.18, ctx.currentTime + 2.0);
  masterGainNode.connect(ctx.destination);

  harmonics.forEach(h => {
    const osc = ctx.createOscillator();
    const g   = ctx.createGain();
    const lfo = ctx.createOscillator();
    const lfoGain = ctx.createGain();

    osc.type = 'sine';
    osc.frequency.value = hz * h.ratio;

    lfo.frequency.value = 0.25;
    lfoGain.gain.value  = hz * h.ratio * 0.003;
    lfo.connect(lfoGain);
    lfoGain.connect(osc.frequency);
    lfo.start();

    g.gain.value = h.gain;
    osc.connect(g);
    g.connect(masterGainNode);
    osc.start();

    bowlNodes.push(osc, lfo);
  });
}

function stopBowl() {
  bowlNodes.forEach(n => { try { n.stop(); n.disconnect(); } catch(e){} });
  if (masterGainNode) { try { masterGainNode.disconnect(); } catch(e){} }
  bowlNodes = [];
  masterGainNode = null;
}

function fadeBowlOut() {
  if (!masterGainNode || !audioCtx) { stopBowl(); return; }
  const ctx = audioCtx;
  masterGainNode.gain.setValueAtTime(masterGainNode.gain.value, ctx.currentTime);
  masterGainNode.gain.linearRampToValueAtTime(0, ctx.currentTime + 2.5);
  setTimeout(() => stopBowl(), 2800);
}

// ===== Canvas 動態能量動畫 =====
let animFrameId = null;
let canvasParticles = [];

const categoryAnimConfig = {
  wealth:       { colors: ['#FFD700','#FFA500','#FFFACD','#FFB700'], mode: 'coins'   },
  love:         { colors: ['#FF69B4','#FFB6C1','#FF1493','#FFC0CB'], mode: 'petals'  },
  career:       { colors: ['#4FC3F7','#1565C0','#E3F2FD','#7CB9E8'], mode: 'rise'    },
  health:       { colors: ['#66BB6A','#A5D6A7','#00E676','#CCFF90'], mode: 'pulse'   },
  family:       { colors: ['#FF7043','#FFAB40','#FFF3E0','#FF8A65'], mode: 'warm'    },
  fiveelements: { colors: ['#FFD700','#66BB6A','#4FC3F7','#EF5350','#CE93D8'], mode: 'orbit' }
};

function initCanvas(category) {
  const canvas = document.getElementById('energy-canvas');
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  canvasParticles = [];

  const cfg = categoryAnimConfig[category];
  const W = canvas.width, H = canvas.height;
  const count = 60;

  for (let i = 0; i < count; i++) {
    const color = cfg.colors[Math.floor(Math.random() * cfg.colors.length)];
    const p = { x: Math.random()*W, y: Math.random()*H, color, alpha: Math.random()*0.6+0.2,
                size: Math.random()*6+2, vx: (Math.random()-0.5)*0.8, vy: 0, angle: Math.random()*Math.PI*2,
                angleSpeed: (Math.random()-0.5)*0.02, life: Math.random()*100, mode: cfg.mode };

    if (cfg.mode === 'coins')  { p.vy = -(Math.random()*1.5+0.5); p.y = H + 20; }
    if (cfg.mode === 'petals') { p.vy = Math.random()*0.8+0.3; p.vx = Math.sin(p.angle)*0.8; p.y = -20; }
    if (cfg.mode === 'rise')   { p.vy = -(Math.random()*1.2+0.3); p.size = Math.random()*4+1; }
    if (cfg.mode === 'pulse')  { p.cx = W/2; p.cy = H/2; p.r = Math.random()*Math.min(W,H)*0.4; p.speed = Math.random()*0.02+0.005; }
    if (cfg.mode === 'warm')   { p.vy = -(Math.random()*0.5+0.2); p.vx = (Math.random()-0.5)*0.6; }
    if (cfg.mode === 'orbit')  { p.cx = W/2; p.cy = H/2; p.r = Math.random()*Math.min(W,H)*0.35+40; p.speed = (Math.random()*0.01+0.005)*(Math.random()<0.5?1:-1); }

    canvasParticles.push(p);
  }
  drawCanvas(category);
}

function drawCanvas(category) {
  const canvas = document.getElementById('energy-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  ctx.clearRect(0, 0, W, H);

  canvasParticles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.alpha;

    if (p.mode === 'coins') {
      // 金幣：圓形+光暈
      const grd = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size*2);
      grd.addColorStop(0, p.color);
      grd.addColorStop(1, 'transparent');
      ctx.fillStyle = grd;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size*2, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
      p.vy -= 0.01; p.x += p.vx; p.y += p.vy;
      if (p.y < -20) { p.y = H+20; p.x = Math.random()*W; p.vy = -(Math.random()*1.5+0.5); }

    } else if (p.mode === 'petals') {
      // 花瓣：橢圓旋轉
      ctx.translate(p.x, p.y); ctx.rotate(p.angle);
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.ellipse(0, 0, p.size, p.size*2, 0, 0, Math.PI*2); ctx.fill();
      p.x += p.vx; p.y += p.vy; p.angle += p.angleSpeed; p.vx = Math.sin(p.angle)*0.8;
      if (p.y > H+20) { p.y = -20; p.x = Math.random()*W; }

    } else if (p.mode === 'rise') {
      // 事業：向上光柱
      const grd = ctx.createLinearGradient(p.x, p.y, p.x, p.y-p.size*8);
      grd.addColorStop(0, p.color); grd.addColorStop(1, 'transparent');
      ctx.fillStyle = grd;
      ctx.fillRect(p.x-p.size/2, p.y-p.size*8, p.size, p.size*8);
      p.y += p.vy;
      if (p.y < -20) { p.y = H+20; p.x = Math.random()*W; }

    } else if (p.mode === 'pulse') {
      // 健康：同心圓擴散
      p.angle += p.speed;
      p.x = p.cx + Math.cos(p.angle)*p.r;
      p.y = p.cy + Math.sin(p.angle)*p.r;
      const grd = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size*3);
      grd.addColorStop(0, p.color); grd.addColorStop(1, 'transparent');
      ctx.fillStyle = grd;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size*3, 0, Math.PI*2); ctx.fill();
      // 呼吸光圈
      p.life += 0.5;
      const rr = (p.life % 100) / 100 * Math.min(W,H) * 0.45;
      ctx.strokeStyle = p.color; ctx.lineWidth = 1;
      ctx.globalAlpha = (1 - (p.life%100)/100) * 0.15;
      ctx.beginPath(); ctx.arc(p.cx, p.cy, rr, 0, Math.PI*2); ctx.stroke();

    } else if (p.mode === 'warm') {
      // 家庭：溫暖光點上升
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
      p.x += p.vx + Math.sin(p.life*0.05)*0.5;
      p.y += p.vy; p.life++;
      p.alpha = Math.max(0, p.alpha - 0.002);
      if (p.y < -20 || p.alpha <= 0) {
        p.y = H+20; p.x = Math.random()*W;
        p.alpha = Math.random()*0.6+0.2;
        p.vx = (Math.random()-0.5)*0.6;
        p.vy = -(Math.random()*0.5+0.2);
        p.life = 0;
      }

    } else if (p.mode === 'orbit') {
      // 五行：五色環繞
      p.angle += p.speed;
      p.x = p.cx + Math.cos(p.angle)*p.r;
      p.y = p.cy + Math.sin(p.angle)*p.r;
      const grd = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size*2.5);
      grd.addColorStop(0, p.color); grd.addColorStop(1, 'transparent');
      ctx.fillStyle = grd;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size*2.5, 0, Math.PI*2); ctx.fill();
    }

    ctx.restore();
  });

  animFrameId = requestAnimationFrame(() => drawCanvas(category));
}

function stopCanvas() {
  if (animFrameId) { cancelAnimationFrame(animFrameId); animFrameId = null; }
  const canvas = document.getElementById('energy-canvas');
  if (canvas) canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);
}

let currentCategory = null;
let selectedMins = 3;
let totalSeconds = 0;
let remainingSeconds = 0;
let timerInterval = null;
let isPaused = false;
let userPhotoSrc = null;
const isMobile = () => /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => {
    p.classList.remove('active');
  });
  const el = document.getElementById(id);
  el.classList.add('active');
  window.scrollTo(0, 0);
}

function showHome() {
  clearInterval(timerInterval);
  timerInterval = null;
  fadeBowlOut();
  stopCanvas();
  showPage('page-home');
}

function showCategory(key) {
  currentCategory = key;
  const cat = categories[key];
  document.getElementById('setup-title').textContent = cat.title;
  document.getElementById('setup-subtitle').textContent = cat.subtitle;
  selectTime(3);
  // Reset photo
  document.getElementById('photo-preview').classList.add('hidden');
  document.getElementById('upload-placeholder').classList.remove('hidden');
  document.getElementById('photo-input').value = '';
  userPhotoSrc = null;
  showPage('page-setup');
}

function selectTime(mins) {
  selectedMins = mins;
  document.querySelectorAll('.time-btn').forEach(btn => {
    btn.classList.toggle('active', parseInt(btn.dataset.mins) === mins);
  });
}

function previewPhoto(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    userPhotoSrc = e.target.result;
    const preview = document.getElementById('photo-preview');
    preview.src = e.target.result;
    preview.classList.remove('hidden');
    document.getElementById('upload-placeholder').classList.add('hidden');
  };
  reader.readAsDataURL(file);
}

function startSession() {
  const cat = categories[currentCategory];
  totalSeconds = selectedMins * 60;
  remainingSeconds = totalSeconds;
  isPaused = false;

  // Set timer background
  document.getElementById('timer-bg').style.backgroundImage = `url('${cat.bg}')`;
  document.getElementById('timer-status').textContent = cat.status;
  
  // Instruction text - responsive
  const instrEl = document.getElementById('timer-instruction');
  instrEl.textContent = isMobile()
    ? '將大拇指按在螢幕上，感受宇宙能量的流動'
    : '請靜心放鬆，雙手自然放在心輪位置，感受能量流動';

  // Photo overlay
  const overlay = document.getElementById('photo-overlay');
  const photoDisplay = document.getElementById('photo-display');
  if (userPhotoSrc) {
    photoDisplay.src = userPhotoSrc;
    overlay.style.display = 'flex';
  } else {
    overlay.style.display = 'none';
  }

  document.getElementById('hz-label').textContent = `♪ ${cat.hz} Hz 頌缽頻率`;
  document.getElementById('pause-btn').textContent = '⏸';
  updateTimerDisplay();
  showPage('page-timer');

  // 播放頌缽音效
  playSingingBowl(cat.hz);

  // 啟動動態動畫
  initCanvas(currentCategory);

  timerInterval = setInterval(() => {
    if (!isPaused) {
      remainingSeconds--;
      updateTimerDisplay();
      if (remainingSeconds <= 0) {
        clearInterval(timerInterval);
        timerInterval = null;
        showComplete();
      }
    }
  }, 1000);
}

function updateTimerDisplay() {
  const mins = Math.floor(remainingSeconds / 60);
  const secs = remainingSeconds % 60;
  document.getElementById('timer-display').textContent =
    String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');
}

function togglePause() {
  isPaused = !isPaused;
  document.getElementById('pause-btn').textContent = isPaused ? '▶' : '⏸';
  if (isPaused) {
    if (audioCtx) audioCtx.suspend();
  } else {
    if (audioCtx) audioCtx.resume();
  }
}

function showComplete() {
  const cat = categories[currentCategory];
  document.getElementById('complete-title').textContent = cat.complete;
  document.getElementById('complete-message').textContent = cat.message;
  fadeBowlOut();
  stopCanvas();
  showPage('page-complete');
  spawnParticles();
}

function repeatSession() {
  showCategory(currentCategory);
}

function spawnParticles() {
  const colors = ['#FFD700', '#FF69B4', '#00BFFF', '#98FB98', '#FFA500', '#DA70D6'];
  for (let i = 0; i < 20; i++) {
    setTimeout(() => {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = Math.random() * 12 + 6;
      p.style.cssText = `
        width: ${size}px; height: ${size}px;
        left: ${Math.random() * 100}vw;
        bottom: -20px;
        background: ${colors[Math.floor(Math.random() * colors.length)]};
        animation-duration: ${Math.random() * 2 + 2}s;
        opacity: ${Math.random() * 0.7 + 0.3};
      `;
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 4000);
    }, i * 100);
  }
}

window.addEventListener('resize', () => {
  const canvas = document.getElementById('energy-canvas');
  if (canvas && animFrameId) {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
});
</script>
